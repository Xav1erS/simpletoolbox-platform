<style>
    /* Navigation Area Styles */
    .navigation-area {
        width: 100%;
        padding: 16px 0;
        background-color: var(--linear-bg-secondary);
        border-bottom: 1px solid var(--linear-border);
        position: relative;
        z-index: 1000;
    }
    
    .nav-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 var(--linear-spacing-xl);
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }
    
    .navigation-brand {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--linear-primary);
        text-decoration: none;
        transition: color var(--linear-transition-fast);
    }
    
    .navigation-brand:hover {
        color: var(--linear-primary-hover);
    }
    
    /* Desktop Navigation Links */
    .nav-links {
        display: flex;
        align-items: center;
        gap: var(--linear-spacing-lg);
    }
    
    .nav-links a {
        color: var(--linear-text-secondary);
        text-decoration: none;
        font-size: var(--linear-font-size-base);
        font-weight: 500;
        transition: all var(--linear-transition-fast);
        padding: 8px 12px;
        border-radius: var(--linear-radius-md);
    }
    
    .nav-links a:hover {
        color: var(--linear-primary);
        background-color: var(--linear-bg-overlay);
    }
    
    /* Mobile Menu Button */
    .mobile-menu-button {
        display: none;
        background: none;
        border: none;
        color: var(--linear-text);
        font-size: 1.25rem;
        cursor: pointer;
        padding: 8px;
        border-radius: var(--linear-radius-md);
        transition: all var(--linear-transition-fast);
    }
    
    .mobile-menu-button:hover {
        background-color: var(--linear-bg-overlay);
        transform: scale(1.1);
    }
    
    /* Theme Toggle Button */
    .theme-toggle-button {
        background: none;
        border: none;
        color: var(--linear-text);
        font-size: 1.25rem;
        cursor: pointer;
        padding: 8px;
        border-radius: var(--linear-radius-md);
        transition: all var(--linear-transition-fast);
        margin-left: var(--linear-spacing-md);
    }
    
    .theme-toggle-button:hover {
        background-color: var(--linear-bg-overlay);
        transform: scale(1.1);
    }
    
    /* Mobile Navigation Menu */
    .mobile-nav-menu {
        position: absolute;
        top: 100%;
        left: 0;
        width: 100%;
        background-color: var(--linear-bg-secondary);
        border-bottom: 1px solid var(--linear-border);
        box-shadow: var(--linear-shadow-md);
        display: none;
        animation: slideDown 0.3s ease-out;
    }
    
    .mobile-nav-menu.active {
        display: block;
    }
    
    .mobile-nav-links {
        padding: var(--linear-spacing-lg);
        display: flex;
        flex-direction: column;
        gap: var(--linear-spacing-md);
    }
    
    .mobile-nav-links a {
        color: var(--linear-text-secondary);
        text-decoration: none;
        font-size: var(--linear-font-size-base);
        font-weight: 500;
        padding: 12px 16px;
        border-radius: var(--linear-radius-md);
        transition: all var(--linear-transition-fast);
    }
    
    .mobile-nav-links a:hover {
        color: var(--linear-primary);
        background-color: var(--linear-bg-overlay);
    }
    
    /* Animation */
    @keyframes slideDown {
        from {
            opacity: 0;
            transform: translateY(-10px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    /* Responsive Design */
    @media (max-width: 768px) {
        .nav-links {
            display: none;
        }
        
        .mobile-menu-button {
            display: block;
        }
        
        .theme-toggle-button {
            margin-left: 0;
        }
        
        .nav-container {
            padding: 0 var(--linear-spacing-lg);
        }
    }
</style>

<script>
    // Mobile Menu Toggle
    const mobileMenuButton = document.getElementById('mobile-menu-button');
    const mobileNavMenu = document.getElementById('mobile-nav-menu');
    
    if (mobileMenuButton && mobileNavMenu) {
        mobileMenuButton.addEventListener('click', () => {
            mobileNavMenu.classList.toggle('active');
            const icon = mobileMenuButton.querySelector('i');
            if (mobileNavMenu.classList.contains('active')) {
                icon.className = 'fas fa-times';
                icon.setAttribute('aria-label', 'Close menu');
            } else {
                icon.className = 'fas fa-bars';
                icon.setAttribute('aria-label', 'Toggle menu');
            }
        });
        
        // Close mobile menu when clicking outside
        document.addEventListener('click', (e) => {
            if (!mobileMenuButton.contains(e.target) && !mobileNavMenu.contains(e.target)) {
                mobileNavMenu.classList.remove('active');
                const icon = mobileMenuButton.querySelector('i');
                icon.className = 'fas fa-bars';
                icon.setAttribute('aria-label', 'Toggle menu');
            }
        });
    }
</script>

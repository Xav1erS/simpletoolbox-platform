        const pageConfig = {
            type: '[page-type]',
            id: '[page-id]',
            navActive: '[nav-item]'
        };
        
        document.addEventListener('DOMContentLoaded', function() {
            if (pageConfig.navActive) {
                const navLink = document.querySelector(`[data-nav="${pageConfig.navActive}"]`);
                if (navLink) {
                    navLink.classList.add('active');
                }
            }
            initPage();
        });
        
        document.addEventListener('pageLoaded', function(event) {
            if (pageConfig.navActive) {
                const navLink = document.querySelector(`[data-nav="${pageConfig.navActive}"]`);
                if (navLink) {

        });
